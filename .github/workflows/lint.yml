name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.md"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Vite+
        run: npm install -g vite-plus

      - name: Install Dependencies
        run: vp install

      - name: Apply Patches
        run: git apply patches/0001-cactbot-all.patch

      - name: Lint
        run: vp check
